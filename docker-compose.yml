
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nexus_sqlserver
    environment:
      SA_PASSWORD: ${DB_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    volumes:
      - nexus_sqldata:/var/opt/mssql
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD}",
             "-Q", "SELECT 1", "-C"]
      interval: 10s
      retries: 5
      start_period: 20s

volumes:
  nexus_sqldata:

networks:
  nexus_network:
    driver: bridge