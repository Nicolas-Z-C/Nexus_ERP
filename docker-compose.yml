version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nexus_sqlserver
    environment:
      SA_PASSWORD: ${DB_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      - "${DB_PORT}:1313"
    volumes:
      - nexus_sqldata:/var/opt/mssql
    networks:
      - nexus_network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "${DB_PASSWORD}", "-Q", "SELECT 1"]
      interval: 10s
      retries: 5
      start_period: 20s

volumes:
  nexus_sqldata:

networks:
  nexus_network:
    driver: bridge